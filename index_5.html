<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Palmilhas Terapêuticas: da Ciência ao Negócio</title>
        <link rel="stylesheet" href="public/css/style.css">
        <link rel="stylesheet" href="public/css/main.css">
        <link rel="icon" type="image/x-icon" href="public/img/logo-ptcn-icone-default.ico">
    </head>

    <body>

        <div data-button="container">
            <a data-button="scroll-top" title="Voltar ao topo da página"><button></button></a>
            <a href="https://wa.me/5512982628132" target="_blank" data-button="whatsapp" title="Fale com a gente no WhatsApp!"><button></button></a>
        </div>

        <section class="header">
            <div class="content">
                <div class="content-default">
                    <div class="container">
                        <img src="public/img/logo-ptcn-4.png" draggable="false">
                        <h2>
                            Saiba como conquistar um negócio lucrativo através das <mark class="gradient">palmilhas terapêuticas</mark> e transformá-las no carro-chefe do seu consultório.
                        </h2>
                        <h3>6 a 8 de novembro | Sempre às 20h</h3>
                    </div>
                    <div class="container">
                        <div class="box">
                            <form id="subscribe">
                                <input type="text" name="user_name" id="user_name" placeholder="Seu nome...">
                                <input type="email" name="user_email" id="user_email" placeholder="Seu melhor e-mail...">
                                <button type="submit" class="my-button">QUERO GARANTIR A MINHA INSCRIÇÃO</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="public/js/floating-buttons.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script>
            $(document).ready(function () {
                const pageID = 5;
                $('#subscribe').submit(function (e) {
                    e.preventDefault();
                    var userData = {
                        pageID: pageID,
                        user_name: $("#user_name").val(),
                        user_email: $("#user_email").val()
                    };
                    $.ajax({
                        type: 'POST',
                        url: 'cadastro.php',
                        data: userData,
                        success: function () {
                            $.ajax({
                                type: 'POST',
                                url: 'mail.php',
                                data: $("#user_email").val(),
                            })
                            document.location = "./obrigado";
                        }
                    });
                });
            });
        </script>

    </body>

</html>
