<!DOCTYPE html>
<html lang="pt" pageID="6">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Palmilhas Terapêuticas: da Ciência ao Negócio</title>
        <link rel="stylesheet" href="public/css/style.css">
        <link rel="stylesheet" href="public/css/main.css">
        <link rel="icon" type="image/x-icon" href="public/img/logo-ptcn-icone-default.ico">
        <!-- Google Tag Manager -->
        <script>(function (w, d, s, l, i) {
                w[l] = w[l] || []; w[l].push({
                    'gtm.start':
                        new Date().getTime(), event: 'gtm.js'
                }); var f = d.getElementsByTagName(s)[0],
                    j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                        'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
            })(window, document, 'script', 'dataLayer', 'GTM-5TTGRP4');</script>
        <!-- End Google Tag Manager -->
    </head>

    <body>

        <img src="public/img/foto-capa-3.png" draggable="false" class="bg-img">

        <section class="header">
            <div class="content">
                <div class="content-default">
                    <div class="container">
                        <img src="public/img/logo-ptcn-4.png" draggable="false">
                        <h2>
                            Descubra como utilizar a palmilha como um modelo de negócio rentável e proporcione tratamento mais eficiente para os seus pacientes.
                        </h2>
                        <h3>6 a 8 de novembro | Sempre às 20h</h3>
                    </div>
                    <div class="container">
                        <div class="box">
                            <form id="subscribe">
                                <input type="text" name="user_name" id="user_name" placeholder="Seu nome...">
                                <input type="email" name="user_email" id="user_email" placeholder="Seu melhor e-mail...">
                                <button type="submit" class="my-button" id="submit">QUERO GARANTIR A MINHA INSCRIÇÃO</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5TTGRP4"
                height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script>
            $(document).ready(function () {
                var pageID = document.documentElement.getAttribute("pageID");
                if (localStorage.getItem("pageID") == null) {
                    localStorage.setItem("pageID", pageID);
                };
                $('#subscribe').submit(function (e) {
                    e.preventDefault();
                    let input1 = $("#user_name").val();
                    let input2 = $("#user_email").val();
                    let warning = document.createElement("span");
                    if (input1 == "" || input2 == "") {
                        $("#subscribe").append(warning);
                        warning.style.color = "tomato";
                        warning.style.fontSize = "0.8rem";
                        warning.style.textAlign = "center";
                        warning.innerHTML = "Parece que há um ou mais campos em branco. Por favor, tente novamente"
                    } else {
                        $("#submit").html("<img src='public/img/loading.gif'>");
                        warning.remove();
                        var userData = {
                            pageID: pageID,
                            user_name: input1,
                            user_email: input2
                        };
                        $.ajax({
                            type: 'POST',
                            url: 'cadastro.php',
                            data: userData,
                            success: function () {
                                $.ajax({
                                    type: 'POST',
                                    url: 'mail.php',
                                    data: {
                                        user_name: input1,
                                        user_email: input2
                                    }
                                });
                                $("#submit").html("QUERO GARANTIR A MINHA INSCRIÇÃO");
                                document.location = "./obrigado";
                            }
                        });
                    }
                });
            });
        </script>

    </body>

</html>
